<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Report Submitted</title>
  </head>
  <body style="font-family: Arial, sans-serif; background: #f8fafc; margin: 0; padding: 24px;">
    <table width="100%" cellspacing="0" cellpadding="0" style="max-width: 640px; margin: 0 auto; background: #ffffff; border: 1px solid #e5e7eb; border-radius: 10px;">
      <tr>
        <td style="padding: 20px 24px; border-bottom: 1px solid #e5e7eb;">
          <h2 style="margin: 0; font-size: 18px; color: #111827;">Daily Work Report Submitted</h2>
        </td>
      </tr>
      <tr>
        <td style="padding: 20px 24px; color: #374151; font-size: 14px;">
          <p style="margin: 0 0 10px;">Employee: <strong>{{name}}</strong></p>
          <p style="margin: 0 0 10px;">Employee Code: <strong>{{employeeCode}}</strong></p>
          <p style="margin: 0 0 10px;">Email: <strong>{{email}}</strong></p>
          <p style="margin: 0 0 16px;">Date: <strong>{{date}}</strong></p>
          <h3 style="margin: 0 0 8px; font-size: 14px; color: #111827;">Subject</h3>
          <p style="margin: 0 0 16px; padding: 10px 12px; background: #f3f4f6; border-radius: 8px;">{{subject}}</p>
          <h3 style="margin: 0 0 8px; font-size: 14px; color: #111827;">Report</h3>
          <div style="white-space: pre-wrap; margin: 0; padding: 10px 12px; background: #f9fafb; border-radius: 8px; border: 1px solid #e5e7eb;">{{body}}</div>
        </td>
      </tr>
    </table>
  </body>
</html>
