name: Ping Her Every 7 Minutes

on:
  schedule:
    - cron: '*/7 * * * *'
  workflow_dispatch:

jobs:
  call-api:
    runs-on: ubuntu-latest
    steps:
      - name: Dont Die Bro
        run: |
          current_hour=$(date +'%H')
          if [[ $current_hour -ge 7  && $current_hour -lt 21 ]]; then
            curl -X GET https://theone-it-backend.onrender.com
          else
            echo "Skipping execution, outside the 7:00 AM - 9:00 PM window."
          fi
