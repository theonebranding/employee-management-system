name: Keep Render service alive

on:
  schedule:
    - cron: "*/15 3-13 * * *"      # Every 10 mins from 08:30 AM IST to 07:59 PM IST
    - cron: "0,10,20,30 14 * * *"  # Extra runs from 07:30 PM IST to 08:00 PM IST
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit entry endpoint
        run: |
          echo "Pinging api check..."
          curl --fail --retry 1 --retry-delay 10 \
            https://apicompany.theonebranding.com \
            && echo "✅ Service is up" \
            || echo "⚠️ Service did not respond"
